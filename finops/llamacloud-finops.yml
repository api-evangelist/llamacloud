description: >-
  FinOps view of LlamaCloud spend. LlamaCloud bills a usage-based credit
  system layered on named subscription tiers. Credits are consumed per page
  for parsing and extraction (by mode/tier), per exported page for indexing,
  per retrieval query, and per chat turn. Each plan includes a monthly
  credit allowance; usage beyond the allowance is billed pay-as-you-go at
  roughly $1.25 per 1,000 credits. Cost is driven primarily by page volume
  and the chosen parse/extract tier.
notes: >-
  Per-page credit costs and the credit-to-dollar rate are subject to change;
  verify against the LlamaIndex pricing and developer docs pricing pages
  during reconciliation.
sources:
- https://www.llamaindex.ai/pricing
- https://developers.llamaindex.ai/python/cloud/general/pricing
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: LlamaIndex
serviceCategory: AI and Machine Learning
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: LlamaCloud
  ServiceCategory: AI and Machine Learning
  ProviderName: LlamaIndex
  PublisherName: LlamaIndex
  InvoiceIssuerName: LlamaIndex
