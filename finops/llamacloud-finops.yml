meters:
- name: parse_pages
  description: Pages parsed by LlamaParse, billed in credits per page by tier (Fast 1, Cost-effective 3, Agentic 10, Agentic Plus 45).
  unit: pages
  aggregation: sum
  dimensions:
  - account
  - tier
  - project
- name: extract_pages
  description: Pages processed by LlamaExtract, billed in credits as extract tier (5-15) plus the underlying parse tier.
  unit: pages
  aggregation: sum
  dimensions:
  - account
  - tier
  - agent
- name: index_exported_pages
  description: Pages exported into a managed index, billed at 2 credits per page.
  unit: pages
  aggregation: sum
  dimensions:
  - account
  - pipeline
- name: retrieval_queries
  description: Retrieval queries against a managed index, billed at 1 credit per query.
  unit: queries
  aggregation: sum
  dimensions:
  - account
  - pipeline
- name: chat_turns
  description: Chat turns over a managed index, billed at 100 credits per turn.
  unit: turns
  aggregation: sum
  dimensions:
  - account
  - pipeline
- name: included_credits
  description: Monthly credits included with the subscription tier (Free 10k, Starter 40k, Pro 400k).
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - plan
- name: overage_credits
  description: Credits consumed beyond the plan allowance, billed pay-as-you-go at ~$1.25 per 1,000.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Pull LlamaCloud usage exports; inspect credit burn by product, tier, project, and pipeline.
- name: Allocation
  description: Tag API keys and projects per workload/team; map credit spend to internal cost centers.
- name: Optimization
  description: Choose the lowest parse tier that meets quality needs (Fast/Cost-effective vs Agentic); cache parsed files; reuse indexes; batch documents to stay within included credits.
- name: Accountability
  description: Assign owners per project/key; review monthly credit consumption against the plan allowance and budget.
maintainers:
